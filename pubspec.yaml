name: pose_estimation
description: "Real-time pose detection from video using RTMPose + ONNX Runtime."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.9.2

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.8
  flutter_webrtc: 1.4.1
  flutter_onnxruntime: ^1.6.4
  wakelock_plus: ^1.2.10
  permission_handler: ^11.3.1
  image: ^4.3.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^5.0.0
  flutter_launcher_icons: ^0.14.3

flutter_launcher_icons:
  android: "ic_launcher"
  ios: true
  image_path: "icon.png"
  remove_alpha_ios: true
  web:
    generate: true
    image_path: "icon.png"
    background_color: "#1a7fd4"
    theme_color: "#1a7fd4"
  windows:
    generate: true
    image_path: "icon.png"
    icon_size: 48
  macos:
    generate: true
    image_path: "icon.png"

flutter:
  uses-material-design: true

  assets:
    - assets/models/
